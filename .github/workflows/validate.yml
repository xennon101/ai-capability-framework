name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate examples
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate public types
        run: npm run generate:types

      - name: Check generated type freshness
        run: git diff --exit-code -- src/generated

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Validate manifests
        run: npm run validate
