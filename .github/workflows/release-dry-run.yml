name: Release Dry Run

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-dry-run:
    name: Release artifact dry run
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            agent-skills/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check release tag alignment
        run: npm run check:release-tag

      - name: Run final certification gate
        run: npm run check:certification

      - name: Create source review archive
        run: npm run archive:source

      - name: Check source review archive
        run: npm run check:source-archive

      - name: Dry-run npm publishes
        run: npm run release:publish:dry
