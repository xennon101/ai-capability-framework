name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag points at main
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            agent-skills/package-lock.json

      - name: Ensure tag matches package version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          AGENT_VERSION=$(node -p "require('./agent-skills/package.json').version")
          PLUGIN_VERSION=$(node -p "require('./agent-skills/.codex-plugin/plugin.json').version")
          EXPECTED_TAG="v${VERSION}"
          if [[ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version $VERSION. Expected $EXPECTED_TAG." >&2
            exit 1
          fi
          if [[ "$AGENT_VERSION" != "$VERSION" ]]; then
            echo "agent-skills package version $AGENT_VERSION does not match root package version $VERSION." >&2
            exit 1
          fi
          if [[ "$PLUGIN_VERSION" != "$VERSION" ]]; then
            echo "agent-skills plugin version $PLUGIN_VERSION does not match root package version $VERSION." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Check release tag alignment
        run: npm run check:release-tag

      - name: Run final certification checks
        run: npm run check:certification

      - name: Ensure npm versions are unpublished
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "ai-capability-framework@${VERSION}" version >/dev/null 2>&1; then
            echo "ai-capability-framework@${VERSION} is already published. Bump the version before tagging." >&2
            exit 1
          fi
          if npm view "@aicf/agent-skills@${VERSION}" version >/dev/null 2>&1; then
            echo "@aicf/agent-skills@${VERSION} is already published. Bump the version before tagging." >&2
            exit 1
          fi

      - name: Select npm dist tag
        id: dist-tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run npm publish
        run:
          npm publish --dry-run --access public --tag "${{ steps.dist-tag.outputs.tag
          }}"

      - name: Dry-run agent skills npm publish
        run:
          npm publish ./agent-skills --dry-run --access public --tag "${{
          steps.dist-tag.outputs.tag }}"

      - name: Publish agent skills to npm
        run:
          npm publish ./agent-skills --access public --tag "${{
          steps.dist-tag.outputs.tag }}"

      - name: Publish root package to npm
        run: npm publish --access public --tag "${{ steps.dist-tag.outputs.tag }}"
