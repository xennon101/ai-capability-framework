name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Public repository checks (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20.x"
          - "22.x"
          - "24.x"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            agent-skills/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install agent skills dependencies
        run: npm --prefix agent-skills ci

      - name: Generate public types
        run: npm run generate:types

      - name: Check generated type freshness
        run: npm run check:generated

      - name: Build package
        run: npm run build

      - name: Typecheck package
        run: npm run typecheck

      - name: Lint repository readiness
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Validate manifests and fixtures
        run: npm run validate

      - name: Run provider conformance
        run: npm run conformance

      - name: Check docs and config formatting
        run: npm run format:check

      - name: Run governance gate
        run: npm run gate:examples

      - name: Check package contents
        run: npm run check:package

      - name: Build and check docs
        run: npm run docs:build

      - name: Check agent skills package
        run: npm run skills:check
