name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Public repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate public types
        run: npm run generate:types

      - name: Check generated type freshness
        run: npm run check:generated

      - name: Build package
        run: npm run build

      - name: Typecheck package
        run: npm run typecheck

      - name: Lint repository readiness
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Validate manifests and fixtures
        run: npm run validate

      - name: Run provider conformance
        run: npm run conformance

      - name: Run governance gate
        run: npm run gate:examples

      - name: Check package contents
        run: npm run check:package

      - name: Build and check docs
        run: npm run docs:build
