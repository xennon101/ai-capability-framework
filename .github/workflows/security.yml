name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Public safety and dependency checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Scan for high-confidence secrets
        run: npm run check:secrets

      - name: Check package public hygiene
        run: npm run check:package-public

      - name: Check workspace public hygiene
        run: npm run check:workspace-public
