schema_version: "1.0"
id: scheduling.availability.get.valid
name: Read availability for a participant
capability_under_test: scheduling.availability.get
tags:
  - scheduling
  - availability
  - tool_selection
input:
  user_message: Check availability for participant USR-3001 on 2026-06-10.
context:
  request_context:
    environment: test
    user:
      id: user_example_scheduler
      roles:
        - scheduler
      permissions:
        - availability.read
      tenant_id: tenant_example
    autonomy_tier: A1
expected:
